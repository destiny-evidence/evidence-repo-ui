name: Deploy to Azure

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      environment:
        type: string
        description: Environment to deploy to
        required: true
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment to deploy to
        required: true
        default: staging
        options:
          - development
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_KEYCLOAK_URL: ${{ vars.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Az CLI login
        uses: azure/login@v2.1.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to blob storage
        uses: Azure/cli@v2.0.0
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
              --destination '$web' \
              --source ./dist \
              --overwrite true

      - name: Purge Front Door cache
        uses: Azure/cli@v2.0.0
        with:
          inlineScript: |
            az afd endpoint purge \
              --resource-group ${{ vars.FRONTDOOR_RESOURCE_GROUP }} \
              --profile-name ${{ vars.FRONTDOOR_PROFILE_NAME }} \
              --endpoint-name ${{ vars.FRONTDOOR_ENDPOINT_NAME }} \
              --content-paths "/*" \
              --no-wait
